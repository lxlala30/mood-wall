server.port=8082
spring.application.name=tool
note.persistence.dir=C:/Users/19230/Desktop/lx/2026
note.persistence.filename=notes.json

# SQLite 数据源配置
spring.datasource.url=jdbc:sqlite:./projects.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=sa
spring.datasource.password=

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.portfolio.entity
# 下划线转驼峰
mybatis.configuration.map-underscore-to-camel-case=true

# 跨域配置
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,DELETE,OPTIONS
spring.web.cors.allowed-headers=*